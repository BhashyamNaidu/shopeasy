name: Deploy ShopEasy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2SSHKEY }}
        script: |
          cd ~/shopeasy
          git pull origin main
          docker-compose down
          docker-compose up -d --build
